<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Nexus node — abstract "N" formed by intersecting paths -->
  <circle cx="60" cy="60" r="54" stroke="#00ebd4" stroke-width="2" opacity="0.3"/>
  <circle cx="60" cy="60" r="42" stroke="#00ebd4" stroke-width="1.5" opacity="0.15"/>

  <!-- Left arc (ascending) -->
  <path d="M 30 85 L 30 35 Q 30 20 50 20 L 75 20" stroke="#00ebd4" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Right arc (descending) -->
  <path d="M 90 35 L 90 85 Q 90 100 70 100 L 45 100" stroke="#00ebd4" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Center node -->
  <circle cx="60" cy="60" r="5" fill="#00ebd4"/>
  <circle cx="60" cy="60" r="10" stroke="#00ebd4" stroke-width="1" opacity="0.4"/>

  <!-- Connection glow -->
  <circle cx="60" cy="60" r="16" fill="#00ebd4" opacity="0.08"/>
</svg>
