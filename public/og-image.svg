<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#05070f"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#00ebd4" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#00ebd4" stroke-width="0.5" opacity="0.06"/>

  <!-- Logo icon centered -->
  <g transform="translate(600, 230)">
    <circle cx="0" cy="0" r="70" stroke="#00ebd4" stroke-width="3" opacity="0.15"/>
    <path d="M -45 -45 L 0 0" stroke="#00ebd4" stroke-width="3" stroke-linecap="round"/>
    <path d="M 45 -45 L 0 0" stroke="#00ebd4" stroke-width="3" stroke-linecap="round"/>
    <path d="M -45 45 L 0 0" stroke="#00ebd4" stroke-width="3" stroke-linecap="round"/>
    <path d="M 45 45 L 0 0" stroke="#00ebd4" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="8" fill="#00ebd4"/>
  </g>

  <!-- Wordmark -->
  <text x="600" y="380" text-anchor="middle" font-family="'Georgia', serif" font-size="72" font-weight="700" fill="#00ebd4" letter-spacing="8">NiraNexus</text>
  
  <!-- Tagline -->
  <text x="600" y="440" text-anchor="middle" font-family="'Courier New', monospace" font-size="24" fill="#64748b" letter-spacing="4">HARDENED DELIBERATIVE OS</text>
  
  <!-- Bottom line -->
  <text x="600" y="520" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#64748b" opacity="0.5">Not a chatbot — an Agentic Fortress</text>
</svg>
